<h2 mat-dialog-title>{{ 'bankAccounts.delete.title' | translate }}</h2>

<mat-dialog-content>
  <p>{{ 'bankAccounts.delete.message' | translate : { name: data.account.name } }}</p>
  <p class="warning">
    <mat-icon class="warning-icon">warning</mat-icon>
    {{ 'bankAccounts.delete.transactionWarning' | translate }}
  </p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="cancel()">
    {{ 'common.cancel' | translate }}
  </button>
  <button mat-flat-button color="warn" type="button" (click)="confirm()">
    {{ 'common.delete' | translate }}
  </button>
</mat-dialog-actions>
